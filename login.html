<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>log in shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0">
                    <div class="card-body p-5">
                        <ul class="nav nav-pills mb-4 justify-content-center" id="pills-tab" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#login">Login</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#register">Register</button>
                            </li>
                        </ul>

                        <div class="tab-content">
                            <div class="tab-pane fade show active" id="login">
                                <form class="needs-validation" novalidate action="login.php" method="post">
                                    <div id="errorMessage" style="color:red; text-align:center;"></div>
                                    <div class="mb-3">
                                        <label class="form-label">Email address</label>
                                        <input type="email" class="form-control" id="loginEmail" required name="email">
                                        <div class="invalid-feedback">Please enter a valid email address.</div>

                                    </div>
                                    
                                    <div class="mb-3">
                                        <label class="form-label">Password</label>
                                        <input type="password" class="form-control" id="loginPassword" minlength="6" required name="password">
                                        <div class="invalid-feedback">Password must be at least 6 characters.</div>
                                    </div>
                                    <button type="submit" class="btn btn-coffee w-100">Sign In</button>
                                </form>
                            </div>

                            <div class="tab-pane fade" id="register">
                                <form action="connect.php" method="post">
                                    <div class="mb-3">
                                        <label class="form-label">Full Name</label>
                                        <input type="text" class="form-control" required name="fullName">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Email</label>
                                        <input type="email" class="form-control" required name="email">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Password</label>
                                        
                                        <input type="password" class="form-control" id="loginPassword" minlength="6" required  name="password">
                                        <div class="invalid-feedback">Password must be at least 6 characters.</div>
                                    </div>
                                    <button type="submit" class="btn btn-coffee w-100">Create Account</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <a href="index.php" class="text-decoration-none text-muted">← Back to Home</a>
                </div>
            </div>
        </div>
    </div>



    <script>
const params = new URLSearchParams(window.location.search);

const error = params.get("error");
const email = params.get("email");

if(error === "wrongpass"){
    document.getElementById("errorMessage").innerText = "❌ Wrong password!";
}

if(error === "nouser"){ 
    document.getElementById("errorMessage").innerText = "❌ Email not found!";
}

// keep email in input
if(email){
    document.querySelector('input[name="email"]').value = email;
}
</script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Example starter JavaScript for disabling form submissions if there are invalid fields
    (function () {
      'use strict'

      // Fetch all the forms we want to apply custom Bootstrap validation styles to
      var forms = document.querySelectorAll('.needs-validation')

      // Loop over them and prevent submission
      Array.prototype.slice.call(forms)
        .forEach(function (form) {
          form.addEventListener('submit', function (event) {
            if (!form.checkValidity()) {
    event.preventDefault()
    event.stopPropagation()
}
            form.classList.add('was-validated')
          }, false)
        })
    })()
</script>
</body>
</html>
